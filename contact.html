<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Alae Rhazouani</title>
  <style>
    @font-face {
      font-family: 'Splatink';
      src: url('assets/fonts/Splatink_PERSONAL_USE_ONLY.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Du Bellay';
      src: url('assets/fonts/dubellay.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue:           #3796d0;
      --font-title:     clamp(32px, 3.65vw, 70px);
      --font-nav:       clamp(13px, 1.3vw,  25px);
      --ease-bounce:    cubic-bezier(.175, .885, .12, 1.775);
      --content-w:      min(700px, 90vw);
      --logo-title-gap: clamp(40px, 8vh, 105px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Background ─────────────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* ── Page layout ─────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(16px, 2.5vh, 28px) clamp(16px, 4vw, 40px) clamp(24px, 4vh, 50px);
    }

    /* ── Logo + title group ─────────────────────────────────────── */
    .top-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--logo-title-gap);
    }

    @keyframes logo-zoom {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(8); opacity: 0; }
    }

    .logo-link {
      display: block;
      width: clamp(56px, 5vw, 96px);
      height: clamp(56px, 5vw, 96px);
      border-radius: 50%;
    }
    .logo-link.zooming {
      animation: logo-zoom 400ms var(--ease-bounce) forwards;
      pointer-events: none;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      display: block;
    }

    /* ── Centre block: contact row ───────────────────────────────── */
    .center-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 4vh, 60px);
      width: var(--content-w);
    }

    /* ── Title ───────────────────────────────────────────────────── */
    .page-title {
      font-family: 'Splatink', cursive;
      font-size: var(--font-title);
      font-weight: normal;
      line-height: 1;
      color: var(--blue);
      white-space: nowrap;
    }
    /* "_" is 100px vs 70px in Figma → ratio 1.43 */
    .page-title .underscore {
      font-size: calc(var(--font-title) * 1.43);
      vertical-align: middle;
    }

    /* ── Contact row (between the two dividers) ──────────────────── */
    .contact-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.5vh, 20px);
    }

    .divider {
      width: 100%;
      height: 2px;
      background: var(--blue);
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(6px, 1vh, 14px) 0;
      gap: 1rem;
    }

    /* Email */
    .email-link {
      font-family: 'Du Bellay', serif;
      font-size: var(--font-nav);
      color: var(--blue);
      text-decoration: none;
      transition: transform 100ms var(--ease-bounce);
      white-space: nowrap;
    }
    .email-link:hover {
      transform: scale(1.05);
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .email-link:active { transform: translateY(2px); }

    /* Social icons */
    .socials {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1.5vw, 24px);
      flex-shrink: 0;
    }
    .socials a {
      display: flex;
      color: var(--blue);
      text-decoration: none;
      transition: transform 100ms var(--ease-bounce);
    }
    .socials a:nth-child(odd):hover  { transform: scale(1.2) rotate(6deg); }
    .socials a:nth-child(even):hover { transform: scale(1.2) rotate(-6deg); }
    .socials a:active                { transform: translateY(2px); }
    .socials svg {
      width:  clamp(20px, 1.5vw, 28px);
      height: clamp(20px, 1.5vw, 28px);
      fill: currentColor;
      display: block;
    }

    /* ── TOC nav ─────────────────────────────────────────────────── */
    .toc {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.8vh, 22px);
      width: var(--content-w);
    }

    .toc-item {
      display: flex;
      width: 100%;
      align-items: baseline;
      font-family: 'Du Bellay', serif;
      font-size: var(--font-nav);
      font-weight: normal;
      color: var(--blue);
      text-decoration: none;
      transition: transform 100ms var(--ease-bounce);
    }
    .toc-item:hover {
      transform: scale(1.05);
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .toc-item:active { transform: translateY(2px); }

    .toc-label { flex-shrink: 0; }
    .toc-dots {
      flex: 1;
      align-self: stretch;
      background-image: radial-gradient(circle, var(--blue) 20%, transparent 21%);
      background-size: 0.55em 0.55em;
      background-repeat: repeat-x;
      background-position: left 62%;
      margin: 0 0.3em;
      opacity: 0.55;
    }
    .toc-num { flex-shrink: 0; }
  </style>
</head>
