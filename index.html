<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Alae Rhazouani</title>
  <style>
    @font-face {
      font-family: 'Splatink';
      src: url('assets/fonts/Splatink_PERSONAL_USE_ONLY.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Du Bellay';
      src: url('assets/fonts/dubellay.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue:        #3796d0;
      --font-title:  clamp(32px, 3.65vw, 70px);   /* 70px @ 1920px */
      --font-nav:    clamp(13px, 1.3vw,  25px);   /* 25px @ 1920px */
      --ease-bounce: cubic-bezier(.175, .885, .12, 1.775);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Background ─────────────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* ── Main layout — centred column ───────────────────────────── */
    .home {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 5vh, 60px);
      padding: clamp(16px, 4vw, 40px);
    }

    /* ── Title ───────────────────────────────────────────────────── */
    .title {
      font-family: 'Splatink', cursive;
      font-size: var(--font-title);
      font-weight: normal;
      line-height: 1;
      color: var(--blue);
      white-space: nowrap;
    }

    /* ── Table-of-contents nav ───────────────────────────────────── */
    .toc {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 2.3vh, 28px);
      width: min(700px, 80vw);
    }

    .toc-item {
      display: flex;
      width: 100%;
      align-items: baseline;
      font-family: 'Du Bellay', serif;
      font-size: var(--font-nav);
      font-weight: normal;
      color: var(--blue);
      text-decoration: none;
      transition: transform 100ms var(--ease-bounce);
    }
    .toc-item:hover {
      transform: scale(1.05);
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .toc-item:active { transform: translateY(2px); }

    .toc-label { flex-shrink: 0; }

    /* CSS dot leaders — scales with font size automatically */
    .toc-dots {
      flex: 1;
      align-self: stretch;
      background-image: radial-gradient(circle, var(--blue) 20%, transparent 21%);
      background-size: 0.55em 0.55em;
      background-repeat: repeat-x;
      background-position: left 62%;
      margin: 0 0.3em;
      opacity: 0.55;
    }

    .toc-num { flex-shrink: 0; }

    /* ── Social icons ────────────────────────────────────────────── */
    .socials {
      position: fixed;
      bottom: clamp(16px, 3.5vh, 40px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: clamp(14px, 1.5vw, 24px);
      z-index: 2;
    }
    .socials a {
      display: flex;
      color: var(--blue);
      text-decoration: none;
      transition: transform 100ms var(--ease-bounce);
    }
    .socials a:nth-child(odd):hover  { transform: scale(1.2) rotate(6deg); }
    .socials a:nth-child(even):hover { transform: scale(1.2) rotate(-6deg); }
    .socials a:active                { transform: translateY(2px); }
    .socials svg {
      width:  clamp(20px, 1.5vw, 28px);
      height: clamp(20px, 1.5vw, 28px);
      fill: currentColor;
      display: block;
    }
  </style>
</head>
